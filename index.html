<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.backgroundColor = 'rgba(220, 38, 38, 0.95)';
        div.style.color = 'white';
        div.style.padding = '30px';
        div.style.zIndex = '999999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.lineHeight = '1.5';
        div.style.whiteSpace = 'pre-wrap';
        div.style.overflow = 'auto';
        div.innerHTML = '<h1 style="font-size: 24px; margin-bottom: 20px;">Uncaught Exception Detected:</h1>' + 
                        '<strong>Message:</strong> ' + message + '<br><br>' +
                        '<strong>Source:</strong> ' + source + ' (line ' + lineno + ', col ' + colno + ')<br><br>' +
                        '<strong>Stack Trace:</strong><br>' + (error && error.stack ? error.stack : 'N/A');
        document.body.appendChild(div);
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.backgroundColor = 'rgba(220, 38, 38, 0.95)';
        div.style.color = 'white';
        div.style.padding = '30px';
        div.style.zIndex = '999999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.lineHeight = '1.5';
        div.style.whiteSpace = 'pre-wrap';
        div.style.overflow = 'auto';
        div.innerHTML = '<h1 style="font-size: 24px; margin-bottom: 20px;">Unhandled Promise Rejection:</h1>' + 
                        '<strong>Reason:</strong> ' + event.reason + '<br><br>' +
                        '<strong>Stack Trace:</strong><br>' + (event.reason && event.reason.stack ? event.reason.stack : 'N/A');
        document.body.appendChild(div);
      });
    </script>
    <script>
      (function() {
        try {
          const saved = localStorage.getItem('pulsetalk_theme');
          if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          console.error('Failed to apply initial theme:', e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulseTalk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'spin-slow': 'spin 3s linear infinite',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom Scrollbar for Chat */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      
      /* Animation Utilities */
      .fade-in-section {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        will-change: opacity, visibility;
      }
      .fade-in-section.is-visible {
        opacity: 1;
        transform: none;
      }

      /* Chat message entry animation */
      @keyframes chatMessageEnter {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .chat-message-enter {
        animation: chatMessageEnter 0.3s ease-out both;
      }
    </style>

</head>
  <body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 antialiased selection:bg-teal-100 selection:text-teal-900 transition-colors duration-300">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
